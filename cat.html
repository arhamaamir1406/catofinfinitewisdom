<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #cat {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 185px;
      height: 202px;
      background-image: url('cat_blink.png');
      background-repeat: no-repeat;
      background-size: 1110px 202px;
    }
  </style>
</head>
<body>
  <div id="cat"></div>

  <script>
    const FRAME_W = 185;
    const cat = document.getElementById('cat');

    function show(f) {
      cat.style.backgroundPosition = `-${f * FRAME_W}px 0px`;
    }

    function doBlink() {
      const slow = Math.random() < 0.25;
      const c    = slow ? 180 : 110;  // ms per closing step

      // Close gradually: 0 → 1 → 2 → 3, then snap open immediately
      setTimeout(() => show(1), 0);
      setTimeout(() => show(2), c);
      setTimeout(() => show(3), c * 2);
      setTimeout(() => {
        show(0);  // snap open — no symmetric return = no second blink
        setTimeout(doBlink, 2500 + Math.random() * 3500);
      }, c * 2 + 50);
    }

    show(0);
    setTimeout(doBlink, 1500 + Math.random() * 2500);
  </script>
</body>
</html>
