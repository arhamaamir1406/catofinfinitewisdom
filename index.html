<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CatofInfiniteWisdom</title>
  <style>
    @font-face {
      font-family: 'Tulados';
      src: url('tulados.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #cat {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 185px;
      height: 202px;
      background-image: url('cat_blink.png');
      background-repeat: no-repeat;
      background-size: 1110px 202px;
      cursor: pointer;
    }

    #close-canvas {
      display: none;
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      cursor: pointer;
    }

    #died-img {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #000;
      cursor: pointer;
    }

    #quote-text {
      display: none;
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-family: 'Tulados', 'Georgia', serif;
      font-size: 2.109375rem;
      line-height: 1.6;
      color: #1a1a1a;
      max-width: 560px;
      width: 90vw;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="cat"></div>
  <canvas id="close-canvas"></canvas>
  <img id="died-img" src="died.jpg" alt="">
  <div id="quote-text"></div>

  <script>
    const FRAME_W = 185;
    const cat = document.getElementById('cat');
    const canvas = document.getElementById('close-canvas');
    const ctx = canvas.getContext('2d');
    const quoteEl = document.getElementById('quote-text');
    const diedImg = document.getElementById('died-img');

    const QUOTES = [
      "What punishments of God are not gifts?",
      "In the end, we will remember not the words of our enemies, but the silence of our friends.",
      "No amount of guilt can solve the past, and no amount of anxiety can change the future.",
      "You will never gain independence if you rely on validation.",
      "We live in a world full of sinners judging each other for sinning differently.",
      "You kill your dreams every time you tell them to the wrong people.",
      "The life in front of you is far more important than the life behind you.",
      "Whenever there is no shoulder to cry on, there is always a ground to kneel and pray.",
      "When people fall in love with someone's flowers and not their roots, they do not know what to do when autumn comes.",
      "It won't matter how loud you love if the other person isn't listening.",
      "You will never find the same person twice, not even in the same person.",
      "Some relationships will end when you choose yourself.",
      "Man is the most insane species. He worships an invisible God and destroys a visible nature, unaware that this nature he's destroying is the God he's worshipping.",
      "I wept when I had no shoes, until I met a man who had no feet.",
      "Every person has two lives, and the second starts when they realize that they have one.",
      "When the power of love overcomes the love of power, the world will know peace.",
      "Sometimes the wrong train will get you to the right destination.",
      "People won't remember what you said, but people will always remember how you made them feel.",
      "When an egg is cracked from within, it means the bird inside is ready to fly free. If it is cracked from the outside, the egg is going to be cooked.",
      "While the world does keep moving, it can be a damn cruel place. But those moments of stillness — that's where the kingdom of God is.",
      "And now that you don't have to be perfect, you can be good.",
      "That's right, we can fly. People can fly.",
      "Sometimes I wake up and I'm Michael Beasley. Sometimes I wake up and I can't find him.",
      "Maybe God made animals unable to talk to show that love is proven through actions, not words.",
      "We gettin' high, we gettin' fat. ",
      "If you can befriend yourself, you will never be lonely",
      "If every day is a good day, there will never be good days.",
    ];

    const DAILY_LIMIT = 9;

    // Use local date so midnight resets at the right time for each user
    function getToday() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Persistent pool: the remaining quotes not yet used across previous days.
    // When pool runs dry (< 9 left), refill with a fresh shuffle of all quotes.
    function loadPool() {
      try {
        const p = JSON.parse(localStorage.getItem('quotePool'));
        if (Array.isArray(p) && p.length > 0) return p;
      } catch { }
      return shuffle(QUOTES);
    }

    function buildTodayBatch() {
      let pool = loadPool();
      if (pool.length < 9) pool = shuffle(QUOTES);
      const batch = pool.splice(0, 9);
      localStorage.setItem('quotePool', JSON.stringify(pool));
      localStorage.setItem('todayBatch', JSON.stringify(batch));
      return batch;
    }

    // Load today's pre-built batch, or create a fresh one for a new day
    let todayBatch;
    if (localStorage.getItem('catDate') === getToday()) {
      try { todayBatch = JSON.parse(localStorage.getItem('todayBatch')); } catch { }
    }
    if (!Array.isArray(todayBatch) || todayBatch.length === 0) {
      todayBatch = buildTodayBatch();
    }

    // In-memory counter, seeded from localStorage on load
    let clickCount = (localStorage.getItem('catDate') === getToday())
      ? (parseInt(localStorage.getItem('catCount'), 10) || 0)
      : 0;

    function incrementClickCount() {
      clickCount++;
      localStorage.setItem('catDate', getToday());
      localStorage.setItem('catCount', String(clickCount));
    }

    function fitQuoteAbove(aboveHeight) {
      const gap = 24;
      const topMargin = 16;
      const available = window.innerHeight - aboveHeight - gap - topMargin;
      quoteEl.style.bottom = (aboveHeight + gap) + 'px';
      quoteEl.style.fontSize = '2.109375rem';
      let size = 2.109375;
      while (quoteEl.scrollHeight > available && size > 0.75) {
        size -= 0.05;
        quoteEl.style.fontSize = size.toFixed(4) + 'rem';
      }
    }

    // showQuote reads todayBatch[clickCount] BEFORE incrementClickCount is called
    function showQuote() {
      quoteEl.textContent = todayBatch[clickCount];
      quoteEl.style.display = 'block';
      fitQuoteAbove(canvas.height);
    }

    function hideQuote() {
      quoteEl.style.display = 'none';
    }

    const img1 = new Image();
    const img2 = new Image();
    img1.src = 'closeframe1.png';
    img2.src = 'closeframe2.png';

    const meow = new Audio('soundreality-cat-meow-fx-461188.mp3');
    const diedAudio = new Audio('diedaudio.mp3');

    let blinkTimer = null;
    let clicking = false;

    function show(f) {
      cat.style.backgroundPosition = `-${f * FRAME_W}px 0px`;
    }

    function doBlink() {
      if (clicking) return;
      const slow = Math.random() < 0.25;
      const c = slow ? 180 : 110;

      setTimeout(() => { if (!clicking) show(1); }, 0);
      setTimeout(() => { if (!clicking) show(2); }, c);
      setTimeout(() => { if (!clicking) show(3); }, c * 2);
      setTimeout(() => {
        if (!clicking) {
          show(0);
          blinkTimer = setTimeout(doBlink, 2500 + Math.random() * 3500);
        }
      }, c * 2 + 50);
    }

    function drawOnCanvas(img) {
      const maxW = window.innerWidth * 0.6;
      const maxH = window.innerHeight * 0.675;
      const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight);
      const w = Math.round(img.naturalWidth * scale);
      const h = Math.round(img.naturalHeight * scale);
      canvas.width = w;
      canvas.height = h;
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
    }

    function dismissBigCat() {
      canvas.style.display = 'none';
      diedImg.style.display = 'none';
      diedAudio.pause();
      diedAudio.currentTime = 0;
      hideQuote();
      cat.style.display = '';
      clicking = false;
      show(0);
      blinkTimer = setTimeout(doBlink, 2500 + Math.random() * 3500);
    }

    function startCloseAnimation() {
      if (clicking) return;

      // Reset counter and get a fresh batch if the day has rolled over
      if (localStorage.getItem('catDate') !== getToday()) {
        clickCount = 0;
        todayBatch = buildTodayBatch();
      }

      clicking = true;
      clearTimeout(blinkTimer);

      cat.style.display = 'none';

      if (clickCount >= DAILY_LIMIT) {
        // Limit reached — show died screen
        canvas.style.display = 'none';
        diedImg.style.display = 'block';
        diedAudio.currentTime = 1;
        diedAudio.play();
      } else {
        canvas.style.display = 'block';
        drawOnCanvas(img1);
        showQuote();
        incrementClickCount();
        meow.currentTime = 0;
        meow.play();
        setTimeout(() => { drawOnCanvas(img2); }, 600);
        meow.addEventListener('ended', () => { drawOnCanvas(img1); }, { once: true });
      }

      setTimeout(() => {
        document.addEventListener('click', dismissBigCat, { once: true });
      }, 0);
    }

    cat.addEventListener('click', startCloseAnimation);

    show(0);
    blinkTimer = setTimeout(doBlink, 1500 + Math.random() * 2500);
  </script>
</body>

</html>
